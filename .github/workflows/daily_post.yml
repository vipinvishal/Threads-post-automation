name: Daily Threads Post

on:
  schedule:
    - cron: '0 5 * * *'     # 10:30 AM IST
    - cron: '30 9 * * *'    # 3:00 PM IST
    - cron: '30 15 * * *'   # 9:00 PM IST
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

# Force Node.js 24 for all actions (suppresses Node.js 20 deprecation warning)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug — check secrets presence
        run: |
          echo "GEMINI_API_KEY set:    ${{ secrets.GEMINI_API_KEY != '' }}"
          echo "GEMINI_API_KEY_2 set:  ${{ secrets.GEMINI_API_KEY_2 != '' }}"
          echo "EXA_API_KEY set:       ${{ secrets.EXA_API_KEY != '' }}"
          echo "BUFFER_API_KEY set:    ${{ secrets.BUFFER_API_KEY != '' }}"
          echo "BUFFER_CHANNEL_ID set: ${{ secrets.BUFFER_CHANNEL_ID != '' }}"

      - name: Generate and schedule post
        run: python scripts/generate_and_schedule.py
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2:  ${{ secrets.GEMINI_API_KEY_2 }}
          EURON_API_KEY:     ${{ secrets.EURON_API_KEY }}
          EXA_API_KEY:       ${{ secrets.EXA_API_KEY }}
          BUFFER_API_KEY:    ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
