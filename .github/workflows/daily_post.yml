name: Daily Threads Post

on:
  schedule:
    - cron: '30 4 * * *'   # 10:00 AM IST (UTC+5:30) every day
  workflow_dispatch:         # allow manual trigger from GitHub Actions tab

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and schedule post
        run: python scripts/generate_and_schedule.py
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2:  ${{ secrets.GEMINI_API_KEY_2 }}
          EURON_API_KEY:     ${{ secrets.EURON_API_KEY }}
          EXA_API_KEY:       ${{ secrets.EXA_API_KEY }}
          BUFFER_API_KEY:    ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
